<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WP Doc Featured Image Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0B1354;
      --blue:   #142282;
      --green:  #34C759;
      --white:  #FFFFFF;
      --gray50: #F9FAFB;
      --gray100:#F3F4F6;
      --gray200:#E5E7EB;
      --gray400:#9CA3AF;
      --gray600:#4B5563;
      --gray900:#111827;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,.10);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--gray100);
      color: var(--gray900);
      min-height: 100vh;
      padding: 32px 16px 64px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 800;
      color: var(--navy);
    }
    .header p {
      margin-top: 6px;
      color: var(--gray600);
      font-size: 15px;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
      align-items: start;
    }
    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
    }

    /* ── Card ── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
    }
    .card h2 {
      font-size: 15px;
      font-weight: 700;
      color: var(--gray600);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 20px;
    }

    /* ── Form ── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray600);
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--gray200);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: var(--gray900);
      background: var(--white);
      transition: border-color .15s;
      outline: none;
    }
    .field input:focus, .field select:focus {
      border-color: var(--blue);
    }
    .field .hint {
      font-size: 11px;
      color: var(--gray400);
      margin-top: 4px;
    }

    /* Collapsible section */
    .collapsible-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      margin-bottom: 16px;
      font-family: inherit;
    }
    .collapsible-toggle .arrow {
      display: inline-block;
      transition: transform .2s;
      font-size: 10px;
    }
    .collapsible-toggle.open .arrow { transform: rotate(90deg); }
    .collapsible-body { display: none; }
    .collapsible-body.open { display: block; }

    /* Separator */
    .sep {
      border: none;
      border-top: 1px solid var(--gray200);
      margin: 20px 0;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 22px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary   { background: var(--navy); color: #fff; width: 100%; }
    .btn-green     { background: var(--green); color: #fff; }
    .btn-outline   { background: transparent; border: 1.5px solid var(--gray200); color: var(--gray900); }
    .btn-sm        { padding: 8px 16px; font-size: 13px; }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    /* ── Canvas preview panel ── */
    .preview-panel { position: relative; }
    .canvas-wrap {
      width: 100%;
      aspect-ratio: 1200/630;
      background: var(--gray100);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1.5px solid var(--gray200);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .canvas-wrap canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .canvas-placeholder {
      color: var(--gray400);
      font-size: 14px;
      text-align: center;
    }
    .canvas-placeholder svg {
      display: block;
      margin: 0 auto 12px;
      opacity: .35;
    }

    /* ── Status / log ── */
    .log {
      margin-top: 16px;
      background: var(--gray900);
      color: #a6f0a6;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      line-height: 1.7;
      min-height: 60px;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }
    .log.visible { display: block; }
    .log .err { color: #ff8a8a; }
    .log .ok  { color: #a6f0a6; }
    .log .inf { color: #ffd580; }

    /* ── Result info ── */
    .result-info {
      margin-top: 16px;
      padding: 14px 16px;
      background: #efffef;
      border: 1px solid #bbf7bb;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .result-info.visible { display: block; }
    .result-info a { color: var(--blue); font-weight: 600; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .loading .spinner { display: inline-block; }
    .loading .btn-label { display: none; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--gray900);
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      box-shadow: 0 8px 32px rgba(0,0,0,.2);
      transform: translateY(80px);
      opacity: 0;
      transition: all .3s;
      z-index: 999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #15803d; }
    .toast.error   { background: #b91c1c; }
  </style>
</head>
<body>

<div class="header">
  <h1>WP Doc Featured Image Generator</h1>
  <p>Enter a doc URL → get a branded 1200×630 featured image, ready to download or upload.</p>
</div>

<div class="layout">

  <!-- ── Left panel: Settings ─────────────────────────────────── -->
  <div>

    <!-- WordPress settings -->
    <div class="card" style="margin-bottom:20px">
      <h2>WordPress Settings</h2>

      <div class="field">
        <label>WordPress Site URL</label>
        <input id="wpUrl" type="url" placeholder="https://wdesignkit.com" />
      </div>

      <button class="collapsible-toggle" id="authToggle" onclick="toggleAuth()">
        <span class="arrow">▶</span> Auth (needed to upload)
      </button>
      <div class="collapsible-body" id="authBody">
        <div class="field">
          <label>Username</label>
          <input id="wpUser" type="text" placeholder="admin" />
        </div>
        <div class="field">
          <label>Application Password</label>
          <input id="wpPass" type="password" placeholder="xxxx xxxx xxxx xxxx" />
          <div class="hint">Generate at WP Admin → Users → Profile → Application Passwords</div>
        </div>
      </div>
    </div>

    <!-- Generate form -->
    <div class="card">
      <h2>Generate Image</h2>

      <div class="field">
        <label>Doc Page URL or Post ID</label>
        <input id="docUrl" type="text" placeholder="https://wdesignkit.com/docs/some-page/" />
      </div>

      <div class="field">
        <label>Category badge text <span style="font-weight:400;color:var(--gray400)">(auto-detected if blank)</span></label>
        <input id="catOverride" type="text" placeholder="Getting Started" />
      </div>

      <hr class="sep" />

      <button class="collapsible-toggle" id="advToggle" onclick="toggleAdv()">
        <span class="arrow">▶</span> Advanced options
      </button>
      <div class="collapsible-body" id="advBody">
        <div class="field">
          <label>Left brand logo</label>
          <select id="leftBrand">
            <option value="wdesignkit">WDesignKit</option>
            <option value="nexter">Nexter</option>
            <option value="tpae">The Plus Addons</option>
            <option value="none">None</option>
          </select>
        </div>
        <div class="field">
          <label>Right brand logo</label>
          <select id="rightBrand">
            <option value="posimyth">POSIMYTH</option>
            <option value="wdesignkit">WDesignKit</option>
            <option value="none">None</option>
          </select>
        </div>
        <div class="field">
          <label>Title font size (px)</label>
          <input id="fontSize" type="number" value="64" min="28" max="100" />
        </div>
        <div class="field">
          <label>Badge colour</label>
          <input id="badgeColor" type="color" value="#34C759" style="padding:4px 8px;height:38px;" />
        </div>
        <div class="field">
          <label>Background colour</label>
          <input id="bgColor" type="color" value="#0B1354" style="padding:4px 8px;height:38px;" />
        </div>
      </div>

      <hr class="sep" />

      <button class="btn btn-primary" id="generateBtn" onclick="runGenerate()">
        <div class="spinner"></div>
        <span class="btn-label">Generate Image</span>
      </button>

      <div class="actions" id="postActions" style="display:none">
        <button class="btn btn-outline btn-sm" onclick="downloadImage()">⬇ Download PNG</button>
        <button class="btn btn-green btn-sm" id="uploadBtn" onclick="runUpload()">
          <div class="spinner" style="border-color:rgba(255,255,255,.4);border-top-color:#fff;width:12px;height:12px;"></div>
          <span class="btn-label">⬆ Set as Featured Image</span>
        </button>
      </div>

      <div class="log" id="log"></div>
    </div>

  </div>

  <!-- ── Right panel: Preview ─────────────────────────────────── -->
  <div class="preview-panel">
    <div class="card">
      <h2>Preview  <span id="previewSize" style="font-weight:400;color:var(--gray400);font-size:12px"></span></h2>
      <div class="canvas-wrap" id="canvasWrap">
        <div class="canvas-placeholder">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="m21 15-5-5L5 21"/>
          </svg>
          Generated image will appear here
        </div>
      </div>
      <div class="result-info" id="resultInfo"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
"use strict";

// ── Constants ─────────────────────────────────────────────────────────────────

const CANVAS_W = 1200, CANVAS_H = 630;

const BRAND_LOGOS = {
  wdesignkit: "https://api.wdesignkit.com/images/website/common/wdesignkit.png",
  posimyth:   "https://posimyth.com/wp-content/uploads/2023/01/new_posimyth_innovation_logo.png",
  nexter:     "https://api.wdesignkit.com/images/website/front/home/nexter-logo.webp",
  tpae:       "https://posimyth.com/wp-content/uploads/2025/06/theplusaddons.png",
};

const BRAND_FALLBACK = {
  wdesignkit: "wdesignkit",
  posimyth:   "POSIMYTH",
  nexter:     "Nexter",
  tpae:       "The Plus Addons",
};

// Persistent state
let lastCanvas = null;
let lastPageInfo = null;

// ── Persist settings ──────────────────────────────────────────────────────────

window.addEventListener("load", () => {
  ["wpUrl","wpUser","wpPass","leftBrand","rightBrand","fontSize","badgeColor","bgColor"]
    .forEach(id => {
      const el = document.getElementById(id);
      const saved = localStorage.getItem("wpdoc_" + id);
      if (saved && el) el.value = saved;
      if (el) el.addEventListener("change", () => localStorage.setItem("wpdoc_" + id, el.value));
    });
  // Don't persist password in localStorage for security
  const wp = document.getElementById("wpPass");
  if (wp) { wp.value = ""; wp.removeEventListener("change", () => {}); }
});

// ── Collapsible toggles ───────────────────────────────────────────────────────

function toggleAuth() {
  const body = document.getElementById("authBody");
  const btn  = document.getElementById("authToggle");
  body.classList.toggle("open");
  btn.classList.toggle("open");
}
function toggleAdv() {
  const body = document.getElementById("advBody");
  const btn  = document.getElementById("advToggle");
  body.classList.toggle("open");
  btn.classList.toggle("open");
}

// ── Log helper ────────────────────────────────────────────────────────────────

function log(msg, type = "ok") {
  const el = document.getElementById("log");
  el.classList.add("visible");
  const line = document.createElement("div");
  line.className = type;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}
function clearLog() {
  const el = document.getElementById("log");
  el.innerHTML = "";
  el.classList.remove("visible");
}

// ── Toast ─────────────────────────────────────────────────────────────────────

function toast(msg, type = "success") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove("show"), 3200);
}

// ── WordPress REST API ────────────────────────────────────────────────────────

function wpAuth() {
  const u = document.getElementById("wpUser").value.trim();
  const p = document.getElementById("wpPass").value.trim();
  if (!u || !p) return null;
  return "Basic " + btoa(u + ":" + p);
}

function siteUrl() {
  return (document.getElementById("wpUrl").value || "").trim().replace(/\/$/, "");
}

async function fetchPageInfo(docUrl) {
  const base = siteUrl();
  if (!base) throw new Error("WordPress Site URL is required.");

  // Resolve slug from URL or use as ID
  docUrl = docUrl.trim();
  let slug = docUrl;
  if (docUrl.startsWith("http")) {
    try {
      slug = new URL(docUrl).pathname.replace(/\/$/, "").split("/").pop();
    } catch (_) {}
  }

  log(`Fetching page info for: ${slug}`, "inf");

  for (const type of ["pages", "posts"]) {
    const params = slug.match(/^\d+$/)
      ? `/${slug}?_embed=1`
      : `?slug=${encodeURIComponent(slug)}&_embed=1`;

    const headers = { "Content-Type": "application/json" };
    const auth = wpAuth();
    if (auth) headers["Authorization"] = auth;

    const res = await fetch(`${base}/wp-json/wp/v2/${type}${params}`, { headers });
    if (!res.ok) continue;

    const data = await res.json();
    const post = Array.isArray(data) ? data[0] : data;
    if (!post) continue;

    // Title
    const title = (post.title?.rendered || "").replace(/<[^>]+>/g, "").trim();

    // Category from _embedded
    let category = "";
    const termGroups = post._embedded?.["wp:term"] || [];
    for (const group of termGroups) {
      for (const term of group) {
        if (["category","doc-category","tutorials-cat"].includes(term.taxonomy)) {
          category = term.name; break;
        }
      }
      if (category) break;
    }

    if (!category && (post.categories || []).length) {
      const auth = wpAuth();
      const h = auth ? { Authorization: auth } : {};
      for (const cid of post.categories.slice(0, 2)) {
        try {
          const cr = await fetch(`${base}/wp-json/wp/v2/categories/${cid}`, { headers: h });
          if (cr.ok) { const cd = await cr.json(); if (cd.name) { category = cd.name; break; } }
        } catch (_) {}
      }
    }

    const featMedia = post._embedded?.["wp:featuredmedia"];
    const featuredImageUrl = featMedia?.[0]?.source_url || "";
    const postType = post.type === "page" ? "pages" : "posts";

    log(`Found: "${title}" [${category || "No category"}] (ID: ${post.id})`, "ok");

    return {
      postId: post.id, postType, url: post.link || "",
      title, category: category || "Documentation",
      featuredImageUrl,
    };
  }

  throw new Error(`Could not find page/post with slug/ID: "${slug}". Check the URL and Site URL.`);
}

// ── Image loading with CORS fallback ─────────────────────────────────────────

function loadImageCors(url) {
  return new Promise((resolve) => {
    if (!url || url === "none") { resolve(null); return; }

    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload  = () => resolve(img);
    img.onerror = () => {
      // Try without CORS header (some servers don't support it)
      const img2 = new Image();
      img2.onload  = () => resolve(img2);
      img2.onerror = () => { log(`  [warn] Could not load logo: ${url}`, "err"); resolve(null); };
      img2.src = url;
    };
    img.src = url + "?_=" + Date.now(); // bust CDN cache
  });
}

// ── Hex → RGB ─────────────────────────────────────────────────────────────────

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r, g, b];
}

// ── Text wrap helper ──────────────────────────────────────────────────────────

function wrapText(ctx, text, maxWidth) {
  const words = text.split(" ");
  const lines = [];
  let cur = [];
  for (const word of words) {
    const test = [...cur, word].join(" ");
    if (ctx.measureText(test).width > maxWidth && cur.length) {
      lines.push(cur.join(" ")); cur = [word];
    } else { cur.push(word); }
  }
  if (cur.length) lines.push(cur.join(" "));
  return lines;
}

// ── Rounded rect ──────────────────────────────────────────────────────────────

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── Core image builder ────────────────────────────────────────────────────────

async function buildImage({ title, category, leftBrand, rightBrand, titleFontSize, badgeColorHex, bgColorHex }) {
  const canvas = document.createElement("canvas");
  canvas.width  = CANVAS_W;
  canvas.height = CANVAS_H;
  const ctx = canvas.getContext("2d");

  const bgRgb = hexToRgb(bgColorHex || "#0B1354");
  const bgLight = bgRgb.map(c => Math.min(255, c + 30));

  // ── 1. Background gradient ──────────────────────────────────────────────────
  const grad = ctx.createLinearGradient(0, 0, CANVAS_W, CANVAS_H);
  grad.addColorStop(0, `rgb(${bgRgb.join(",")})`);
  grad.addColorStop(1, `rgb(${bgLight.join(",")})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // ── 2. Radial glow ──────────────────────────────────────────────────────────
  const glowGrad = ctx.createRadialGradient(CANVAS_W/2, CANVAS_H/2, 0, CANVAS_W/2, CANVAS_H/2, 340);
  glowGrad.addColorStop(0,   "rgba(30,50,200,0.22)");
  glowGrad.addColorStop(0.6, "rgba(30,50,200,0.08)");
  glowGrad.addColorStop(1,   "rgba(30,50,200,0)");
  ctx.fillStyle = glowGrad;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // ── 3. Bottom accent line ───────────────────────────────────────────────────
  ctx.fillStyle = badgeColorHex || "#34C759";
  ctx.fillRect(0, CANVAS_H - 5, CANVAS_W, 5);

  // ── 4. Logos ────────────────────────────────────────────────────────────────
  const LOGO_H = 48, MX = 50, MY = 42;

  const loadLogo = async (brand) => {
    if (!brand || brand === "none") return null;
    const url = BRAND_LOGOS[brand];
    if (!url) return null;
    log(`  Loading logo: ${brand}`, "inf");
    return loadImageCors(url);
  };

  const [leftImg, rightImg] = await Promise.all([loadLogo(leftBrand), loadLogo(rightBrand)]);

  const drawLogoOrText = (img, brand, x, y, alignRight = false) => {
    if (img) {
      const w = Math.round((img.naturalWidth / img.naturalHeight) * LOGO_H);
      const dx = alignRight ? x - w : x;
      try { ctx.drawImage(img, dx, y, w, LOGO_H); } catch(_) {}
    } else if (brand && brand !== "none") {
      ctx.font = "600 22px 'Inter', Arial, sans-serif";
      ctx.fillStyle = "#FFFFFF";
      const text = BRAND_FALLBACK[brand] || brand.toUpperCase();
      const tw = ctx.measureText(text).width;
      ctx.fillText(text, alignRight ? x - tw : x, y + LOGO_H * 0.7);
    }
  };

  drawLogoOrText(leftImg, leftBrand, MX, MY, false);
  drawLogoOrText(rightImg, rightBrand, CANVAS_W - MX, MY, true);

  // ── 5. Category badge ────────────────────────────────────────────────────────
  const CAT_SIZE = 28, PAD_X = 34, PAD_Y = 14, RADIUS = 50;
  ctx.font = `600 ${CAT_SIZE}px 'Inter', Arial, sans-serif`;
  const catW = ctx.measureText(category).width;
  const catH = CAT_SIZE * 1.2;

  const badgeW = catW + PAD_X * 2;
  const badgeH = catH + PAD_Y * 2;
  const bx = (CANVAS_W - badgeW) / 2;
  const by = CANVAS_H / 2 - badgeH - 50;

  ctx.fillStyle = badgeColorHex || "#34C759";
  roundRect(ctx, bx, by, badgeW, badgeH, RADIUS);
  ctx.fill();

  ctx.fillStyle = "#FFFFFF";
  ctx.textBaseline = "middle";
  ctx.fillText(category, bx + PAD_X, by + badgeH / 2);

  // ── 6. Title ────────────────────────────────────────────────────────────────
  const MAX_W = CANVAS_W * 0.80;
  let fs = parseInt(titleFontSize) || 64;
  let lines = [];

  while (fs >= 28) {
    ctx.font = `bold ${fs}px 'Inter', Arial, sans-serif`;
    lines = wrapText(ctx, title, MAX_W);
    if (lines.length <= 3) break;
    fs -= 4;
  }

  ctx.font = `bold ${fs}px 'Inter', Arial, sans-serif`;
  ctx.fillStyle = "#FFFFFF";
  ctx.textBaseline = "alphabetic";

  const lineH = fs * 1.25;
  let ty = by + badgeH + 44 + lineH;

  for (const line of lines) {
    const lw = ctx.measureText(line).width;
    ctx.fillText(line, (CANVAS_W - lw) / 2, ty);
    ty += lineH;
  }

  return canvas;
}

// ── Generate pipeline ─────────────────────────────────────────────────────────

async function runGenerate() {
  const btn = document.getElementById("generateBtn");
  const docInput = document.getElementById("docUrl").value.trim();

  if (!docInput) { toast("Enter a doc URL or post ID.", "error"); return; }

  clearLog();
  btn.classList.add("loading");
  btn.disabled = true;
  document.getElementById("postActions").style.display = "none";
  document.getElementById("resultInfo").classList.remove("visible");

  try {
    // 1. Fetch page info (skip if site URL is blank — use manual inputs)
    let pageInfo;
    const base = siteUrl();

    if (base) {
      pageInfo = await fetchPageInfo(docInput);
      lastPageInfo = pageInfo;
    } else {
      // No WP URL — use URL as title
      log("No WordPress URL — using URL as title", "inf");
      pageInfo = {
        postId: null,
        title: docInput,
        category: document.getElementById("catOverride").value.trim() || "Documentation",
        url: docInput,
      };
      lastPageInfo = null;
    }

    const category = document.getElementById("catOverride").value.trim() || pageInfo.category;

    // 2. Build canvas
    log("Rendering image...", "inf");
    const canvas = await buildImage({
      title:         pageInfo.title,
      category,
      leftBrand:     document.getElementById("leftBrand").value,
      rightBrand:    document.getElementById("rightBrand").value,
      titleFontSize: document.getElementById("fontSize").value,
      badgeColorHex: document.getElementById("badgeColor").value,
      bgColorHex:    document.getElementById("bgColor").value,
    });

    lastCanvas = canvas;

    // 3. Show preview
    const wrap = document.getElementById("canvasWrap");
    wrap.innerHTML = "";
    wrap.appendChild(canvas);
    document.getElementById("previewSize").textContent = `${CANVAS_W} × ${CANVAS_H} px`;
    document.getElementById("postActions").style.display = "flex";

    log("[OK] Image generated successfully.", "ok");
    toast("Image generated!");

    // Show result info
    if (pageInfo.postId) {
      const wpBase = siteUrl();
      const editUrl = `${wpBase}/wp-admin/post.php?post=${pageInfo.postId}&action=edit`;
      const ri = document.getElementById("resultInfo");
      ri.classList.add("visible");
      ri.innerHTML = `
        <strong>${pageInfo.title}</strong><br>
        Category: <strong>${category}</strong> &nbsp;|&nbsp; Post ID: <strong>${pageInfo.postId}</strong><br>
        <a href="${editUrl}" target="_blank">Open in WordPress editor →</a>
      `;
    }

  } catch (e) {
    log("[ERROR] " + e.message, "err");
    toast(e.message, "error");
  } finally {
    btn.classList.remove("loading");
    btn.disabled = false;
  }
}

// ── Download ──────────────────────────────────────────────────────────────────

function downloadImage() {
  if (!lastCanvas) { toast("Generate an image first.", "error"); return; }
  const a = document.createElement("a");
  a.download = "featured-image.png";
  a.href = lastCanvas.toDataURL("image/png");
  a.click();
  toast("Downloaded!");
}

// ── Upload to WordPress ───────────────────────────────────────────────────────

async function runUpload() {
  if (!lastCanvas) { toast("Generate an image first.", "error"); return; }
  if (!lastPageInfo?.postId) { toast("Page info not available — enter a live doc URL and try again.", "error"); return; }

  const auth = wpAuth();
  if (!auth) {
    toggleAuth();
    toast("Enter your WordPress username and Application Password first.", "error");
    return;
  }

  const btn = document.getElementById("uploadBtn");
  btn.classList.add("loading");
  btn.disabled = true;
  log("Uploading to WordPress...", "inf");

  try {
    // Canvas → Blob
    const blob = await new Promise((res) => lastCanvas.toBlob(res, "image/png"));

    const base = siteUrl();
    const title = lastPageInfo.title;
    const slug  = title.toLowerCase().replace(/[^\w\s-]/g,"").replace(/\s+/g,"-").slice(0,60);
    const filename = `featured-${slug}.png`;

    // 1. Upload to media library
    const formData = new FormData();
    formData.append("file", blob, filename);

    log("  Uploading image to media library...", "inf");
    const uploadRes = await fetch(`${base}/wp-json/wp/v2/media`, {
      method: "POST",
      headers: {
        Authorization: auth,
        "Content-Disposition": `attachment; filename="${filename}"`,
      },
      body: blob,
    });

    if (!uploadRes.ok) {
      const err = await uploadRes.text();
      throw new Error(`Media upload failed (${uploadRes.status}): ${err.slice(0, 200)}`);
    }

    const media = await uploadRes.json();
    log(`  Uploaded media ID: ${media.id}`, "ok");

    // Set alt text
    await fetch(`${base}/wp-json/wp/v2/media/${media.id}`, {
      method: "POST",
      headers: { Authorization: auth, "Content-Type": "application/json" },
      body: JSON.stringify({ title, alt_text: title }),
    }).catch(() => {});

    // 2. Set as featured image
    log("  Setting as featured image...", "inf");
    const updateRes = await fetch(`${base}/wp-json/wp/v2/${lastPageInfo.postType}/${lastPageInfo.postId}`, {
      method: "POST",
      headers: { Authorization: auth, "Content-Type": "application/json" },
      body: JSON.stringify({ featured_media: media.id }),
    });

    if (!updateRes.ok) {
      const err = await updateRes.text();
      throw new Error(`Could not set featured image (${updateRes.status}): ${err.slice(0, 200)}`);
    }

    log(`[OK] Featured image set! Media URL: ${media.source_url}`, "ok");

    const editUrl = `${base}/wp-admin/post.php?post=${lastPageInfo.postId}&action=edit`;
    const ri = document.getElementById("resultInfo");
    ri.classList.add("visible");
    ri.innerHTML += `<br><strong style="color:#15803d">Featured image uploaded successfully!</strong><br>
      <a href="${media.source_url}" target="_blank">View image →</a> &nbsp;|&nbsp;
      <a href="${editUrl}" target="_blank">Edit page →</a>`;

    toast("Featured image set in WordPress!");

  } catch (e) {
    log("[ERROR] " + e.message, "err");
    toast(e.message, "error");
  } finally {
    btn.classList.remove("loading");
    btn.disabled = false;
  }
}

// Allow Enter key in doc URL field to trigger generate
document.getElementById("docUrl").addEventListener("keydown", (e) => {
  if (e.key === "Enter") runGenerate();
});
</script>
